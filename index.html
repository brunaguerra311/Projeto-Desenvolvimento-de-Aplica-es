
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário de Login e Registro</title>
    <link rel="stylesheet" href="estilo.css">

    <script language="javascript" type="text/javascript">
        function validarCadastro() {
           
            var nome = formCadastro.nome_cad.value;
            var email = formCadastro.email_cad.value;
            var senha = formCadastro.senha_cad.value;

         
            if (nome == "") {
                alert('Preencha o campo com seu nome!');
                formCadastro.nome_cad.focus();
                return false;
            }

           
            if (email == "") {
                alert('O campo E-mail é obrigatório!');
                formCadastro.email_cad.focus();
                return false;
            }

          
            if (senha == "") {
                alert('O campo Senha é obrigatório!');
                formCadastro.senha_cad.focus();
                return false;
            }

            
            if (senha.length <= 3 || senha.length > 8) {
                alert('A senha deve ter entre 3 e 8 caracteres!');
                formCadastro.senha_cad.focus();
                return false;
            }

            alert("Cadastro realizado com sucesso!");
            return true;
        }
    </script>
</head>
<body>
    <div class="container"> 
        <a class="links" id="paracadastro"></a>
        <a class="links" id="paralogin"></a>

        <div class="content">
            <div id="login">
                <form method="post" action="">
                    <h1>Tech Soluções</h1>
                    <h1>Login</h1>
                    <p>
                        <label for="nome_login">Seu e-mail</label>
                        <input id="nome_login" name="name_login" type="text" placeholder="ex.contato@projecao.com">
                    </p>
                    <p>
                        <label for="email_login">Sua senha</label>
                        <input id="email_login" name="email_login" type="password" placeholder="ex.senha">
                    </p>
                    <p>
                        <input type="checkbox" name="manterlogado" id="manterlogado">
                        <label for="manterlogado">Manter-me logado</label>
                    </p>
                    <p>
                        <input type="submit" value="Logar">
                    </p>
                    <p class="link">
                        Ainda não tem conta? <a href="#paracadastro">Fazer Cadastro</a>
                    </p>
                </form>
            </div>
            
            <div id="cadastro">
                <form name="formCadastro" method="post" action="" onsubmit="return validarCadastro()">
                    <h1>Tech Soluções</h1>
                    <h1>Cadastro</h1>
                    <p>
                        <label for="nome_cad">Seu nome</label>
                        <input id="nome_cad" name="nome_cad" type="text" placeholder="nome">
                    </p>
                    <p>
                        <label for="email_cad">Seu email</label> 
                        <input id="email_cad" name="email_cad" type="email" placeholder="contato@projecao.com">
                    </p>
                    <p>
                        <label for="senha_cad">Sua senha</label> 
                        <input id="senha_cad" name="senha_cad" type="password" placeholder="mín. 3, máx. 8">
                    </p>
                    <p>
                        <input type="submit" value="Cadastrar">
                    </p>
                    <p class="link">
                        Já tem uma conta? <a href="#paralogin">Ir para Login</a>
                    </p>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
